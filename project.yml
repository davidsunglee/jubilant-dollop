name: FlappyBird
options:
  bundleIdPrefix: com.jubilant-dollop
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  AudioKit:
    url: https://github.com/AudioKit/AudioKit.git
    from: "5.6.0"
  SoundpipeAudioKit:
    url: https://github.com/AudioKit/SoundpipeAudioKit.git
    from: "5.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: "YES"

targets:
  FlappyBird-iOS:
    type: application
    platform: iOS
    sources:
      - path: FlappyBird
        excludes:
          - "**/.DS_Store"
    resources:
      - path: FlappyBird/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jubilant-dollop.FlappyBird
        PRODUCT_NAME: FlappyBird
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: AudioKit
      - package: SoundpipeAudioKit

  FlappyBird-macOS:
    type: application
    platform: macOS
    sources:
      - path: FlappyBird
        excludes:
          - "**/.DS_Store"
    resources:
      - path: FlappyBird/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jubilant-dollop.FlappyBird
        PRODUCT_NAME: FlappyBird
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: AudioKit
      - package: SoundpipeAudioKit
